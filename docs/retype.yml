start:
  pro: true
  open: false

input: .
output: .public
url: https://ddnexus.github.io/pagy/

include:
  - "/assets/nav.html.erb"
  - "/gem/apps/enable_rails_page_segment.rb"
  - "/gem/config/pagy.rb"
  - "/gem/locales/en.yml"
  - "/gem/stylesheets/pagy.css"
  - "/gem/stylesheets/pagy-tailwind.css"

branding:
  title: Pagy
  logo: assets/images/pagy-the-frog.png
  label: 43.5.5
  colors:
    label:
      text: "#ffffff"
      background: "#1f7a1f"

meta:
  title: " 💚 Pagy"

links:
  - text: GitHub
    link: https://github.com/ddnexus/pagy
    icon: mark-github
    target: blank
  - text: Issues
    link: https://github.com/ddnexus/pagy/issues
    icon: issue-opened
    target: blank
  - text: Q&A
    link: https://github.com/ddnexus/pagy/discussions/categories/q-a
    icon: comment-discussion
    target: blank
  - text: Discussions
    link: https://github.com/ddnexus/pagy/discussions
    icon: comment-discussion
    target: blank

search:
  mode: full

backlinks:
  enabled: false

breadcrumb:
  home: Pagy
  separator: ":icon-arrow-right:"

theme:
  base:
    base-color: "#008000"
  dark:
    base-color: "#7cb342"

lastUpdated:
  date:
    enabled: true
    source: committer

nav:
  mode: stack
  icons:
    mode: pages

nextprev:
  mode: exclude

footer:
  copyright: "&copy; 2017-{{ date.now.year }} • [Domizio Demichelis](https://github.com/ddnexus) • [MIT License](https://opensource.org/licenses/MIT)"
